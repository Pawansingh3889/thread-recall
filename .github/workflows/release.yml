name: Release

# Publishes to PyPI when you push a version tag, e.g. `git tag v0.1.0 && git push --tags`.
# Uses PyPI Trusted Publishing (OIDC) so there is no token to store. One-time setup:
# create the project on PyPI and add this repo as a trusted publisher, then add a
# GitHub environment named "pypi".

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
